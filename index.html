<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header-page">
        <div class="header-page__first-adaptive">
            <a href="#"><img src="burger.svg" alt="header-page__burger-menu" class="header-page__burger-menu"></a>
            <div class="header-page__vline-adaptive"></div>
            <a href="#"><img src="Group.svg" alt="header-page__logo" class="header-page__logo"></a>
        </div>
        <div class="header-page__second-adaptive">
            <a href="#" class="header-page__call"><img src="call.svg" alt="call"></a>
            <a href="#" class="header-page__chat"><img src="chat.svg" alt="chat"></a>
            <a href="#" class="header-page__profile"><img src="profile.svg" alt="profile" ></a>
            <div class="header-page__vline"></div>
            <a href="#"><img src="repair.svg" alt="header-page__repair" class="header-page__repair"></a>
            <a href="#"><img src="checkstatus.svg" alt="header-page__check" class="header-page__check"></a>
        </div>
    </header>
    <main>
        <section class="first-page">
            <div class="first-page__title">
                <div class="first-page__half-oval"></div>
                <div class="first-page__first-text">
                    Услуги и сервисы
                </div>
            </div>
            <div class="main-scroll">
                <div class="scroll">
                    <div>
                        <input type="radio" name="scroll-group" id="tab1" checked hidden>
                        <label for="tab1" class="scroll__first-block">
                        Ремонтируемые устройства
                        </label>
                    </div>
                    <div>
                        <input type="radio" name="scroll-group" id="tab2" hidden>
                        <label for="tab2" class="scroll__second-block">
                            Дополнительные услуги
                        </label>
                    </div>
                    <div>
                        <input type="radio" name="scroll-group" id="tab3" hidden>
                        <label for="tab3" class="scroll__third-block">
                            Цены на услуги
                        </label>
                    </div>
                    <div>
                        <input type="radio" name="scroll-group" id="tab4" hidden>
                        <label for="tab4" class="scroll__fourth-block">
                            Адреса сервисных центров
                        </label>
                    </div>
                    <div>
                        <input type="radio" name="scroll-group" id="tab5" hidden>
                        <label for="tab5" class="scroll__fifth-block">
                            Специальные цены
                        </label>
                    </div>
                </div>    
            </div>
            <div class="text-block">
                <div class="text-block__first-text">
                    Мы являемся авторизованным 
                    сервисным центром по ремонту техники
                    Dell. Только у нас вы можете 
                    отремонтировать свой ноутбук Dell с 
                    официальной гарантией производителя.
                    <div class="text-block__adaptive">
                        Мы успешно работаем с 1992 года и
                        заслужили репутацию надежного партнера
                    </div>
                    <div class="text-block__next">
                        <img src="expand.svg" alt="arrow" class="text-block__arrow">
                        <p>Читать далее</p>
                    </div>
                </div>
                <div><img src="mg_3223.svg" alt="image" class="text-block__main-image"></div>
            </div>
        </section>
    </main>
</body>
</html>
